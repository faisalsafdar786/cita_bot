name: Check Cita Previa

on:
  schedule:
    # GitHub's minimum reliable interval is about every 5 minutes,
    # but actual runs can lag by a few minutes during busy periods.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run appointment check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROVINCE: 'Barcelona'
          PROCEDURE: 'POLICIA-TOMA DE HUELLA'
        run: node bot.js
